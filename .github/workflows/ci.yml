name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Test (pytest)
        run: pytest -q
      - name: Scan benign fixtures (must pass)
        run: |
          skillsentry scan fixtures/benign/get_weather.tool.json
          skillsentry scan fixtures/benign/search_docs/SKILL.md
      - name: Scan malicious fixture (must be blocked)
        run: |
          if skillsentry scan fixtures/malicious/add_numbers.tool.json; then
            echo "ERROR: malicious fixture was not flagged" && exit 1
          else
            echo "OK: malicious fixture correctly flagged (non-zero exit)"
          fi
